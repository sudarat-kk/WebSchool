<div class="modal-container">

  <!-- Header Zone: แถบสีม่วงอ่อนพร้อมโลโก้ -->
  <div class="modal-header-bar">
    <div class="logo-placeholder">
    </div>
  </div>

  <!-- Content Zone -->
  <div class="modal-content">
    <!-- ปุ่มปิด (X) -->
    <button class="btn-close" (click)="onClose()">
      <span class="material-icons">close</span>
    </button>

    <!-- Tab Selection: เมนูสลับหัวข้อฟอร์ม -->
    <div class="modal-tabs">
      <button type="button" [class.active]="activeTab === 'subject'" (click)="switchTab('subject')">
        เพิ่มรายวิชาใหม่
      </button>
      <button type="button" [class.active]="activeTab === 'curriculum'" (click)="switchTab('curriculum')">
        เพิ่มหลักสูตรใหม่
      </button>
    </div>

    <!-- ================= ฟอร์ม 1: เพิ่มรายวิชาใหม่ ================= -->
    <form *ngIf="activeTab === 'subject'" class="modal-form">
      <div class="form-group">
        <label for="curriculum">เลือกโครงสร้างหลักสูตรที่จะผูก</label>
        <div class="select-wrapper">
          <select id="curriculum" name="curriculum">
            <option value="" disabled selected>เลือกโครงสร้างหลักสูตร...</option>
            <option value="1">หลักสูตรวิศวกรรมศาสตรบัณฑิต</option>
            <option value="2">หลักสูตรวิทยาศาสตรบัณฑิต</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="subjectName">ชื่อรายวิชา</label>
        <input type="text" id="subjectName" name="subjectName" placeholder="กรอกชื่อรายวิชา">
      </div>

      <div class="form-group short-input">
        <label for="credits">หน่วยกิต</label>
        <input type="number" id="credits" name="credits" placeholder="0">
      </div>

      <div class="form-actions right">
        <button type="submit" class="btn-submit">ยืนยัน</button>
      </div>
    </form>

    <!-- ================= ฟอร์ม 2: เพิ่มหลักสูตรใหม่ ================= -->
    <form *ngIf="activeTab === 'curriculum'" class="modal-form">
      <div class="form-row">
        <div class="form-group">
          <label for="curriculumId">รหัสอ้างอิงหลักสูตร(ID)</label>
          <input type="text" id="curriculumId" name="curriculumId" placeholder="กรอกรหัสอ้างอิง">
        </div>

        <div class="form-group">
          <label for="groupName">ชื่อกลุ่มหลักสูตร</label>
          <input type="text" id="groupName" name="groupName" placeholder="กรอกชื่อกลุ่มหลักสูตร">
        </div>
      </div>

      <div class="form-actions center">
        <button type="submit" class="btn-submit-wide">สร้างและนำเข้าหลักสูตร</button>
      </div>
    </form>

  </div>
</div>
