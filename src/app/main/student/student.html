<div class="student-page">
  <div class="page-header">
    <button mat-icon-button class="back-button" routerLink="/">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <h1 class="course-title">หลักสูตรชั้นนายพัน เหล่า ส. รุ่นที่ 63</h1>
  </div>

  <div class="alert-title-container">
    <a routerLink="/student/login" class="alert-title">
      ระบบแจ้งผลคะแนนผู้เรียน
      <mat-icon class="alert-icon">warning</mat-icon>
    </a>
  </div>

  <div class="chart-container">
    <iframe width="80%" height="450"
      src="https://lookerstudio.google.com/embed/reporting/b482bd10-b6da-447f-8651-b8ba6a71b73f/page/p_9vcxiz9lxd"
      frameborder="0" style="border:0; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);" allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
    </iframe>
  </div>

  <div class="filter-row">
    <div class="filter-left">
      <div class="custom-select-wrapper">
        <select class="custom-select" (change)="onAssessmentChange($event)">
          <option value="" disabled selected>กรุณาเลือกแบบประเมิน</option>
          <option value="1">ประเมินอาจารย์ผู้สอน</option>
          <option value="2">ประเมินอาจารย์กำกับหลักสูตร</option>
          <option value="3">ประเมินหลักสูตร</option>
        </select>
      </div>
    </div>
    <div class="filter-right">
      <div class="search-wrapper">
        <input type="text" class="search-input" placeholder="ค้นหารายวิชา" (input)="onSearch($event)" />
        <mat-icon class="search-icon">search</mat-icon>
      </div>
    </div>
  </div>

  <div class="cards-grid" *ngIf="selectedAssessment">
    <div class="course-card" *ngFor="let course of filteredCourses" (click)="openForm(course)">
      <div class="card-text">{{ course.text }}</div>
      <div class="status-dot" [ngClass]="course.status"></div>
    </div>
  </div>
</div>
