<div class="admin-page">
  <div class="page-header">
    <!-- ปุ่มย้อนกลับไปหน้าคุณครู -->
    <button mat-icon-button class="back-button" routerLink="/teacher">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <h1 class="course-title">ส่วนจัดการระบบ (สำหรับผู้ดูแลระบบ)</h1>
  </div>
  
  <div class="content-container">
    <p>หน้านี้เป็นส่วนที่ใช้สำหรับผู้ดูแลระบบในการจัดการลิงก์แบบประเมินต่างๆ</p>
    
    <!-- ส่วนข้อมูลและปุ่มลิงก์ที่แยกคลาสเรียบร้อยแล้ว -->
    <div class="management-section">
      <h3 class="section-title">เมนูการจัดการ</h3>
      
      <div class="action-card">
        <div class="card-details">
          <h4 class="card-title">แบบกรอกคะแนนนักเรียน</h4>
          <p class="card-subtitle">สำหรับเข้าสู่หน้าบันทึกและจัดการคะแนนในระบบ</p>
        </div>
        
        <!-- ใช้ routerLink ชี้ไปที่ /admin/scoremanagement ตามที่เซ็ตไว้ -->
        <button mat-raised-button color="primary" routerLink="/admin/scoremanagement" class="btn-navigate">
          <mat-icon class="btn-icon">edit</mat-icon>
          ไปยังหน้ากรอกคะแนน
        </button>
      </div>
    </div>

  </div>
</div>
